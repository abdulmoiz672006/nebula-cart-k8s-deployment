name: Nebula Cart Production CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pipeline-execution:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Build Application Artifacts
      run: npm run build

    - name: Docker Build Check
      run: docker build -t nebula-cart:${{ github.sha }} .

    - name: Spin up Local K8s Cluster
      uses: helm/kind-action@v1.10.0
      with:
        cluster_name: nebula-cluster
        wait: 120s

    - name: Deploy and Verify K8s Manifests
      run: |
        # Step A: Pehle Namespace banana zaroori hai
        kubectl apply -f k8s/namespace.yml
        
        # Step B: Ab baaki saari files apply karein
        kubectl apply -f k8s/
        
        echo "Waiting for pods to be ready..."
        # Note: Aapke deployment ka naam 'store-deployment' hai (as per your cat command)
        kubectl rollout status deployment/store-deployment -n online-store --timeout=90s
        
        # Final check for logs
        kubectl get all -n online-store
