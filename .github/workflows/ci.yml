name: Nebula Cart CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Application
      run: npm run build

    - name: Docker Build Check
      run: docker build -t nebula-cart:test .

    - name: Create Kind Cluster
      uses: helm/kind-action@v1.10.0
      with:
        cluster_name: nebula-test-cluster

    - name: Kubernetes Manifests Validation
      run: |
        # Wait for nodes to be ready
        kubectl wait --for=condition=Ready nodes --all --timeout=60s
        # Apply manifests
        kubectl apply -f k8s/
        # Show resources for the log/screenshot
        kubectl get all
